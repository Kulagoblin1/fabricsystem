<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fabric Info</title>
<style>body{font-family:Arial;padding:20px;}h2{margin-bottom:20px;}p{margin:5px 0;}</style>
</head>
<body>
<h2>Fabric Information</h2>
<div id="content">Loading...</div>
<script>
const SUPABASE_URL="https://nbzlglatwvomrhflqvgi.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iemxnbGF0d3ZvbXJoZmxxdmdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjk4NTIsImV4cCI6MjA5MTIwNTg1Mn0.lxkTMgLBBFv5y2O1jGLZVGcE-MiaA3JV8-p50irSgBs";
async function loadData(){
    const id=new URLSearchParams(window.location.search).get("id");
    if(!id){document.getElementById("content").innerHTML="Invalid QR Code";return;}
    const res=await fetch(`${SUPABASE_URL}/rest/v1/rolls?id=eq.${id}`,{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});
    const data=await res.json();
    if(!data.length){document.getElementById("content").innerHTML="No Data Found";return;}
    const d=data[0];
    document.getElementById("content").innerHTML=
      `<p>Reference: ${d.ref}</p>
       <p>Batch: ${d.batch}</p>
       <p>Color: ${d.color}</p>
       <p>Width: ${d.width}</p>
       <p>Length: ${d.length}M</p>
       <p>Roll No: ${d.roll_no}</p>
       <p>Order No: ${d.order_no}</p>`;
}
loadData();
</script>
</body>
</html>
