<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabric QR Generator</title>
<style>
  body { font-family: Arial; padding: 20px; }
  #label {
    width: 70mm;
    height: 50mm;
    border: 1px solid #000;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 5px;
    box-sizing: border-box;
  }
  #qr { width: 40mm; height: 40mm; }
  #info {
    margin-left: 5px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  #info div { margin-bottom: 2px; }
</style>
</head>
<body>

<h2>Fabric QR Generator</h2>

<div>
  <label>Ref: <input type="text" id="ref"></label><br>
  <label>Batch: <input type="text" id="batch"></label><br>
  <label>Width (cm): <input type="text" id="width"></label><br>
  <label>Color: <input type="text" id="color"></label><br>
  <label>Length (m): <input type="text" id="length"></label><br>
  <label>Roll Number: <input type="text" id="roll_number"></label><br>
  <label>Order Number: <input type="text" id="order_number"></label><br>
  <button onclick="generateQR()">Generate QR</button>
</div>

<br>
<div id="label">
  <canvas id="qr"></canvas>
  <div id="info"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrious/dist/qrious.min.js"></script>
<script>
const SUPABASE_URL = "https://nbzlglatwvomrhflqvgi.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5iemxnbGF0d3ZvbXJoZmxxdmdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjk4NTIsImV4cCI6MjA5MTIwNTg1Mn0.lxkTMgLBBFv5y2O1jGLZVGcE-MiaA3JV8-p50irSgBs";

function generateQR() {
  const ref = document.getElementById('ref').value;
  const batch = document.getElementById('batch').value;
  const width = document.getElementById('width').value;
  const color = document.getElementById('color').value;
  const length = document.getElementById('length').value;
  const roll_number = document.getElementById('roll_number').value;
  const order_number = document.getElementById('order_number').value;

  // 生成唯一 ID
  const id = "roll_" + Date.now();

  // 二维码 URL
  const qrUrl = `https://fabricsystem.vercel.app/view.html?id=${id}`;

  // 生成二维码
  new QRious({
    element: document.getElementById('qr'),
    value: qrUrl,
    size: 180
  });

  // 显示面料信息
  document.getElementById('info').innerHTML = `
    <div>Ref: ${ref}</div>
    <div>Batch: ${batch}</div>
    <div>Width: ${width}</div>
    <div>Color: ${color}</div>
    <div>Length: ${length} m</div>
    <div>Roll#: ${roll_number}</div>
    <div>Order#: ${order_number}</div>
  `;

  // 保存到 Supabase
  fetch(`${SUPABASE_URL}/rest/v1/rolls`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({
      id: id,
      ref: ref,
      batch: batch,
      size: width,
      color: color,
      length: length,
      roll_number: roll_number,
      order_number: order_number
    })
  })
  .then(res => res.json())
  .then(data => console.log("Saved to Supabase:", data))
  .catch(err => console.error("Save failed:", err));
}
</script>

</body>
</html>
